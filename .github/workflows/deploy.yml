name: Deploy to Server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploying changes
        run: |
          cd /var/www/todo-app
          git fetch origin
          git reset --hard origin/main
          
          cd backend
          npm install
          pm2 restart todo-app || pm2 start server.js --name "todo-app"
